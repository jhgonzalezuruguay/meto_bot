services:
  - type: web
    name: meto_bot
    env: python
    plan: free
    runtime: python3.12   # Fuerza a Render a usar Python 3.12
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: BOT_TOKEN
        sync: false   # cargás el valor real en el panel de Render
